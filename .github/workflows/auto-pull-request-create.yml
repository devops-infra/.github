name: (Automatic) Pull Request Create

on:
  push:
    branches-ignore:
      - master
      - main
      - release/**
      - dependabot/**

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write

jobs:
  call-auto-pull-request-create:
    uses: ./.github/workflows/reusable-auto-pull-request-create.yml
    with:
      runs-on: ubuntu-24.04-arm
      task-version: 3.x
      profile: other
    secrets: inherit
