name: (Auto) Create Pull Request

on:
  push:
    branches-ignore:
      - master
      - dependabot/**

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  call-auto-create-pull-request:
    uses: devops-infra/.github/templates/other/workflows/auto-create-pull-request.yml@master
    with:
      runs-on: ubuntu-24.04-arm
      task-version: 3.x
      enable-docker: false
      enable-lint: false
      docker-platforms: amd64,arm64
    secrets:
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
