name: (Reusable - Manual) Update Version

on:
  workflow_call:
    inputs:
      runs-on:
        description: Runner to use
        type: string
        default: ubuntu-24.04-arm
      task-version:
        description: Task version to install
        type: string
        default: 3.x
      bump-type:
        description: Bump type (patch, minor, major, set)
        type: string
        required: false
        default: patch
      explicit-version:
        description: Explicit version when type="set"
        type: string
        default: ''
      build-and-push-only:
        description: Skip version update and only build/push artifacts
        type: boolean
        default: false
      profile:
        description: Repository profile (actions, dockerized, other, static)
        type: string
        default: actions
      docker-platforms:
        description: Docker platforms to build for when build-only mode is enabled
        type: string
        default: amd64,arm64
    outputs:
      version:
        description: Updated version
        value: ${{ jobs.update.outputs.version }}
    secrets:
      DOCKER_TOKEN:
        required: false

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  update:
    name: Update version and push release branch
    runs-on: ${{ inputs.runs-on }}
    outputs:
      version: ${{ steps.export-version.outputs.REL_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        uses: arduino/setup-task@v2.0.0
        with:
          version: ${{ inputs.task-version }}

      - name: Update version
        id: version
        if: ${{ !inputs.build-and-push-only }}
        env:
          BUMP_TYPE: ${{ inputs.bump-type }}
          INPUT_VERSION: ${{ inputs.explicit-version }}
          PROFILE: ${{ inputs.profile }}
        run: |
          set -eux
          if [ "${PROFILE}" = "actions" ]; then
            case "${BUMP_TYPE}" in
              set)
                if [ -z "${INPUT_VERSION}" ]; then
                  echo "Missing version for type=set"
                  exit 1
                fi
                task version:set VERSION_OVERRIDE="${INPUT_VERSION}"
                ;;
              patch)
                task version:update:patch
                ;;
              minor)
                task version:update:minor
                ;;
              major)
                task version:update:major
                ;;
              *)
                echo "Unknown type: ${BUMP_TYPE}"
                exit 1
                ;;
            esac
          else
            normalize_and_validate_version() {
              local input="$1"
              local candidate
              candidate="${input#v}"
              if ! printf "%s" "${candidate}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                return 1
              fi
              printf "v%s" "${candidate}"
            }

            get_current_version() {
              local current
              current=$(task version:get 2>/dev/null || true)
              if [ -z "${current}" ] && [ -f .version ]; then
                current=$(tr -d '\n' < .version)
              fi
              if [ -z "${current}" ]; then
                return 1
              fi
              normalize_and_validate_version "${current}"
            }

            case "${BUMP_TYPE}" in
              set)
                if [ -z "${INPUT_VERSION}" ]; then
                  echo "Missing version for type=set"
                  exit 1
                fi
                next=$(normalize_and_validate_version "${INPUT_VERSION}") || {
                  echo "Invalid explicit version: ${INPUT_VERSION}. Expected vX.Y.Z or X.Y.Z"
                  exit 1
                }
                ;;
              patch|minor|major)
                current=$(get_current_version) || {
                  echo "Current version not found or invalid. Expected vX.Y.Z"
                  exit 1
                }
                no_v=${current#v}
                IFS='.' read -r major minor patch <<< "${no_v}"

                case "${BUMP_TYPE}" in
                  patch)
                    next="v${major}.${minor}.$((patch + 1))"
                    ;;
                  minor)
                    next="v${major}.$((minor + 1)).0"
                    ;;
                  major)
                    next="v$((major + 1)).0.0"
                    ;;
                esac
                ;;
              *)
                echo "Unknown type: ${BUMP_TYPE}"
                exit 1
                ;;
            esac

            printf "%s" "${next}" > .version
          fi
          echo "REL_VERSION=$(task version:get)" >> "$GITHUB_OUTPUT"

      - name: Resolve current version for build-only mode
        id: version-current
        if: ${{ inputs.build-and-push-only }}
        run: echo "REL_VERSION=$(task version:get)" >> "$GITHUB_OUTPUT"

      - name: Install Docker Buildx
        if: ${{ inputs.build-and-push-only && (inputs.profile == 'actions' || inputs.profile == 'dockerized') }}
        uses: docker/setup-buildx-action@v4

      - name: Install QEMU
        if: ${{ inputs.build-and-push-only && (inputs.profile == 'actions' || inputs.profile == 'dockerized') }}
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:latest
          platforms: ${{ inputs.docker-platforms }}

      - name: Build and push artifacts only
        if: ${{ inputs.build-and-push-only && (inputs.profile == 'actions' || inputs.profile == 'dockerized') }}
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          VERSION_SUFFIX: ''
        run: |
          task docker:cmds
          task docker:push
          task docker:push:inspect

      - name: Build-only mode without docker
        if: ${{ inputs.build-and-push-only && inputs.profile != 'actions' && inputs.profile != 'dockerized' }}
        run: echo "Build-only mode requested with docker disabled; skipping image build/push"

      - name: Create and push release tags
        if: ${{ !inputs.build-and-push-only }}
        env:
          VERSION: ${{ steps.version.outputs.REL_VERSION }}
        run: |
          set -eux
          version_no_v="${VERSION#v}"
          major="v$(echo "${version_no_v}" | awk -F. '{print $1}')"
          minor="v$(echo "${version_no_v}" | awk -F. '{print $1"."$2}')"

          if git ls-remote --tags origin "refs/tags/${VERSION}" | grep -q .; then
            echo "Release tag ${VERSION} already exists on origin"
            exit 1
          fi

          git tag --annotate "${VERSION}" --message "${VERSION}"
          git push origin "refs/tags/${VERSION}"

          git tag --force --annotate "${minor}" --message "${VERSION}"
          git push --force origin "refs/tags/${minor}"

          git tag --force --annotate "${major}" --message "${VERSION}"
          git push --force origin "refs/tags/${major}"

      - name: Create GitHub release
        if: ${{ !inputs.build-and-push-only }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.REL_VERSION }}
          generate_release_notes: true

      - name: Export version output
        id: export-version
        run: |
          if [ "${{ inputs.build-and-push-only }}" = "true" ]; then
            echo "REL_VERSION=${{ steps.version-current.outputs.REL_VERSION }}" >> "$GITHUB_OUTPUT"
          else
            echo "REL_VERSION=${{ steps.version.outputs.REL_VERSION }}" >> "$GITHUB_OUTPUT"
          fi
