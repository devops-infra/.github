name: (Reusable - Auto) Pull Request Create

on:
  workflow_call:
    inputs:
      runs-on:
        description: Runner to use
        type: string
        default: ubuntu-24.04-arm
      task-version:
        description: Task version to install
        type: string
        default: 3.x
      enable-lint:
        description: Enable lint step
        type: boolean
        default: true
      profile:
        description: Repository profile (actions, dockerized, other, static)
        type: string
        default: actions
      docker-platforms:
        description: Docker platforms to build for
        type: string
        default: amd64,arm64
    secrets:
      DOCKER_TOKEN:
        required: false

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  pull-request:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        uses: arduino/setup-task@v2.0.0
        with:
          version: ${{ inputs.task-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get template
        env:
          VERSION_SUFFIX: ''
        run: |
          task git:set-config
          task git:get-pr-template

      - name: Create Pull Request
        uses: devops-infra/action-pull-request@v1
        with:
          github_token: ${{ github.token }}
          assignee: ${{ github.actor }}
          template: .tmp/PULL_REQUEST_TEMPLATE.md
          get_diff: true

  lint:
    if: inputs.enable-lint
    needs: [pull-request]
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        uses: arduino/setup-task@v2.0.0
        with:
          version: ${{ inputs.task-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run linters
        run: task lint

  docker:
    if: inputs.profile == 'actions' || inputs.profile == 'dockerized'
    needs: [pull-request]
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        uses: arduino/setup-task@v2.0.0
        with:
          version: ${{ inputs.task-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install QEMU
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:latest
          platforms: ${{ inputs.docker-platforms }}

      - name: Build and push image
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          VERSION_SUFFIX: '-test'
        run: task docker:push

      - name: Inspect image
        env:
          VERSION_SUFFIX: '-test'
        run: task docker:push:inspect

      - name: Detect container structure test configs
        id: cst-configs
        run: |
          shopt -s nullglob
          files=(tests/docker/*.yml tests/docker/*.yaml)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s\n' "${files[@]}" | sort > "$RUNNER_TEMP/cst-configs.txt"
          {
            echo "has_tests=true"
            echo "config<<EOF"
            cat "$RUNNER_TEMP/cst-configs.txt"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Get test image ref
        id: cst-image
        if: steps.cst-configs.outputs.has_tests == 'true'
        run: |
          VERSION="$(task version:get)"
          IMAGE_REF="devopsinfra/${{ github.event.repository.name }}:${VERSION}-test"
          echo "image=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Run container structure tests
        if: steps.cst-configs.outputs.has_tests == 'true'
        uses: devops-infra/action-container-structure-test@v1
        with:
          image: ${{ steps.cst-image.outputs.image }}
          config: ${{ steps.cst-configs.outputs.config }}
          pull: true
