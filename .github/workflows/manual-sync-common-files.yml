name: (Manual) Sync Common Files

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner to use'
        type: string
        default: 'ubuntu-24.04-arm'
      task-version:
        description: 'Task version to install'
        type: string
        default: '3.x'
      sync-type:
        description: 'File type to sync (all, configs, ignores, taskfiles)'
        type: string
        required: true
    secrets:
      GITHUB_TOKEN:
        required: true

jobs:
  update:
    name: Sync common files and create pull request
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        uses: arduino/setup-task@v2.0.0
        with:
          version: ${{ inputs.task-version }}

      - name: Sync files and get PR template
        id: version
        env:
          TASKFILES_BASE_URL: https://raw.githubusercontent.com/devops-infra/.github/refs/heads/master/.github/taskfiles
        run: |
          set -eux
          case "${{ inputs.sync-type }}" in
            all)
              task sync:configs
              task sync:ignores
              ;;
            configs)
              task sync:configs
              ;;
            ignores)
              task sync:ignores
              ;;
            taskfiles)
              ;;
            *)
              echo "Unknown sync type: ${{ inputs.sync-type }}"
              exit 1
              ;;
          esac

          if [ "${{ inputs.sync-type }}" = "all" ] || [ "${{ inputs.sync-type }}" = "taskfiles" ]; then
            echo "▶️ Syncing Taskfiles from devops-infra/.github..."
            curl -sL "${TASKFILES_BASE_URL}/Taskfile.yml" -o ./Taskfile.yml
            curl -sL "${TASKFILES_BASE_URL}/Taskfile.cicd.yml" -o ./Taskfile.cicd.yml
            curl -sL "${TASKFILES_BASE_URL}/Taskfile.docker.yml" -o ./Taskfile.docker.yml
            curl -sL "${TASKFILES_BASE_URL}/Taskfile.variables.yml" -o ./Taskfile.variables.yml
            git add Taskfile*.yml
            echo "✅ Synced Taskfiles"
          fi
          task git:set-config
          task git:get-pr-template

      - name: Push to release branch
        uses: devops-infra/action-commit-push@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          commit_message: ":art: Sync common files from devops-infra/.github"
          target_branch: ${{ format('release/{0}', steps.version.outputs.REL_VERSION) }}

      - name: Create Pull Request
        uses: devops-infra/action-pull-request@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          assignee: ${{ github.actor }}
          template: .tmp/PULL_REQUEST_TEMPLATE.md
          get_diff: true
