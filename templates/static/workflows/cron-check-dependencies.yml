name: (Cron) Weekly repository health

on:
  workflow_call:
    inputs:
      runs-on:
        description: Runner to use
        type: string
        default: ubuntu-24.04-arm
      task-version:
        description: Task version to install
        type: string
        default: 3.x
      stale-days:
        description: Mark branches/issues stale after this many days
        type: number
        default: 60
      issue-title:
        description: Issue title for weekly report
        type: string
        default: (Weekly) Repository health report
      issue-labels:
        description: Comma-separated labels for weekly report issue
        type: string
        default: automation,dependencies

jobs:
  call:
    uses: devops-infra/.github/.github/workflows/reusable-cron-check-dependencies.yml@v1
    with:
      runs-on: ${{ inputs.runs-on }}
      task-version: ${{ inputs.task-version }}
      enable-lint: true
      profile: static
      stale-days: ${{ inputs.stale-days }}
      issue-title: ${{ inputs.issue-title }}
      issue-labels: ${{ inputs.issue-labels }}
