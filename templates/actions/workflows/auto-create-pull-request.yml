name: (Auto) Create Pull Request

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner to use'
        type: string
        default: 'ubuntu-24.04-arm'
      task-version:
        description: 'Task version to install'
        type: string
        default: '3.x'
      enable-docker:
        description: 'Enable Docker buildx and QEMU for multi-arch builds'
        type: boolean
        default: true
      enable-lint:
        description: 'Run linters before build'
        type: boolean
        default: true
      docker-platforms:
        description: 'Docker platforms to build for'
        type: string
        default: 'amd64,arm64'
    secrets:
      DOCKER_TOKEN:
        required: false

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  lint:
    if: inputs.enable-lint
    name: Lint
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        uses: arduino/setup-task@v2.0.0
        with:
          version: ${{ inputs.task-version }}

      - name: Run linters
        run: task lint

  build-and-push:
    name: Build and push
    runs-on: ${{ inputs.runs-on }}
    needs: [lint]
    if: inputs.enable-docker && (needs.lint.result == 'success' || needs.lint.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        uses: arduino/setup-task@v2.0.0
        with:
          version: ${{ inputs.task-version }}

      - name: Install Docker Buildx
        if: inputs.enable-docker
        uses: docker/setup-buildx-action@v3

      - name: Install QEMU
        if: inputs.enable-docker
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:latest
          platforms: ${{ inputs.docker-platforms }}

      - name: Get Docker commands
        run: task docker:cmds

      - name: Build and push test image
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: task docker:push

      - name: Inspect image
        run: task docker:push:inspect

  pull-request:
    name: Pull Request
    runs-on: ${{ inputs.runs-on }}
    needs: [build-and-push]
    if: always() && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        uses: arduino/setup-task@v2.0.0
        with:
          version: ${{ inputs.task-version }}

      - name: Get template
        run: task git:get-pr-template

      - name: Create Pull Request
        uses: devops-infra/action-pull-request@v1
        with:
          github_token: ${{ github.token }}
          assignee: ${{ github.actor }}
          template: .tmp/PULL_REQUEST_TEMPLATE.md
          get_diff: true
