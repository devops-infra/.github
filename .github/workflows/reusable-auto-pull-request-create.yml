name: (R)(A) Pull Request Create

on:
  workflow_call:
    inputs:
      runs-on:
        description: Runner to use
        type: string
        default: ubuntu-24.04-arm
      task-version:
        description: Task version to install
        type: string
        default: 3.x
      enable-lint:
        description: Enable lint step
        type: boolean
        default: true
      profile:
        description: Repository profile (actions, dockerized, other, static)
        type: string
        default: actions
      docker-platforms:
        description: Docker platforms to build for
        type: string
        default: amd64,arm64
    secrets:
      DOCKER_TOKEN:
        required: false

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write

jobs:
  pull-request:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Enforce organization caller for reusable workflow
        if: ${{ github.event_name == 'workflow_call' }}
        run: |
          if [ "${{ github.repository_owner }}" != "devops-infra" ]; then
            echo "This reusable workflow can only be called by devops-infra repositories."
            exit 1
          fi

      - name: Log workflow parameters
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "repository=${{ github.repository }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "inputs.runs-on=${{ inputs.runs-on }}"
          echo "inputs.task-version=${{ inputs.task-version }}"
          echo "inputs.enable-lint=${{ inputs.enable-lint }}"
          echo "inputs.profile=${{ inputs.profile }}"
          echo "inputs.docker-platforms=${{ inputs.docker-platforms }}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Get template
        env:
          VERSION_SUFFIX: ''
        run: |
          task git:set-config
          task git:get-pr-template

      - name: Create Pull Request
        uses: devops-infra/action-pull-request@v1
        with:
          github_token: ${{ github.token }}
          assignee: ${{ github.actor }}
          template: .tmp/PULL_REQUEST_TEMPLATE.md
          get_diff: true

  lint:
    if: inputs.enable-lint
    needs: [pull-request]
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Log workflow parameters
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "repository=${{ github.repository }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "inputs.runs-on=${{ inputs.runs-on }}"
          echo "inputs.task-version=${{ inputs.task-version }}"
          echo "inputs.enable-lint=${{ inputs.enable-lint }}"
          echo "inputs.profile=${{ inputs.profile }}"
          echo "inputs.docker-platforms=${{ inputs.docker-platforms }}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Run linters
        run: task lint

  docker:
    if: inputs.profile == 'actions' || inputs.profile == 'dockerized'
    needs: [pull-request]
    runs-on: ${{ inputs.runs-on }}
    outputs:
      image_tag: ${{ steps.e2e-image-tag.outputs.value }}
    steps:
      - name: Log workflow parameters
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "repository=${{ github.repository }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "inputs.runs-on=${{ inputs.runs-on }}"
          echo "inputs.task-version=${{ inputs.task-version }}"
          echo "inputs.enable-lint=${{ inputs.enable-lint }}"
          echo "inputs.profile=${{ inputs.profile }}"
          echo "inputs.docker-platforms=${{ inputs.docker-platforms }}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Install Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install QEMU
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:latest
          platforms: ${{ inputs.docker-platforms }}

      - name: Build and push image
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          VERSION_SUFFIX: '-test'
        run: task docker:push

      - name: Resolve E2E test image tag
        id: e2e-image-tag
        run: echo "value=$(task version:get)-test" >> "$GITHUB_OUTPUT"

      - name: Inspect image
        env:
          VERSION_SUFFIX: '-test'
        run: task docker:push:inspect

      - name: Detect container structure test configs
        id: cst-configs
        run: |
          shopt -s nullglob
          files=(tests/docker/*.yml tests/docker/*.yaml)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s\n' "${files[@]}" | sort > "$RUNNER_TEMP/cst-configs.txt"
          {
            echo "has_tests=true"
            echo "config<<EOF"
            cat "$RUNNER_TEMP/cst-configs.txt"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Get test image ref
        id: cst-image
        if: steps.cst-configs.outputs.has_tests == 'true'
        run: |
          VERSION="$(task version:get)"
          IMAGE_REF="devopsinfra/${{ github.event.repository.name }}:${VERSION}-test"
          echo "image=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Run container structure tests
        if: steps.cst-configs.outputs.has_tests == 'true'
        uses: devops-infra/action-container-structure-test@v1
        with:
          image: ${{ steps.cst-image.outputs.image }}
          config: ${{ steps.cst-configs.outputs.config }}
          pull: true

  e2e-action-commit-push:
    if: inputs.profile == 'actions' && github.event.repository.name == 'action-commit-push'
    needs: [pull-request]
    permissions:
      contents: write
    uses: devops-infra/triglav/.github/workflows/e2e-action-commit-push.yml@master
    with:
      mode: ref
      image_tag: ''
      action_ref: ${{ github.sha }}
    secrets: inherit

  e2e-action-pull-request:
    if: inputs.profile == 'actions' && github.event.repository.name == 'action-pull-request'
    needs: [pull-request]
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: devops-infra/triglav/.github/workflows/e2e-action-pull-request.yml@master
    with:
      mode: ref
      image_tag: ''
    secrets: inherit

  e2e-action-container-structure-test:
    if: inputs.profile == 'actions' && github.event.repository.name == 'action-container-structure-test'
    needs: [pull-request]
    permissions:
      contents: read
    uses: devops-infra/triglav/.github/workflows/e2e-action-container-structure-test.yml@master
    with:
      mode: ref
      image_tag: ''
    secrets: inherit

  e2e-action-format-hcl:
    if: inputs.profile == 'actions' && github.event.repository.name == 'action-format-hcl'
    needs: [docker]
    permissions:
      contents: read
    uses: devops-infra/triglav/.github/workflows/e2e-action-format-hcl.yml@master
    with:
      mode: image
      image_tag: ${{ needs.docker.outputs.image_tag }}
    secrets: inherit

  e2e-action-tflint:
    if: inputs.profile == 'actions' && github.event.repository.name == 'action-tflint'
    needs: [docker]
    permissions:
      contents: read
    uses: devops-infra/triglav/.github/workflows/e2e-action-tflint.yml@master
    with:
      mode: image
      image_tag: ${{ needs.docker.outputs.image_tag }}
    secrets: inherit

  e2e-action-terraform-validate:
    if: inputs.profile == 'actions' && github.event.repository.name == 'action-terraform-validate'
    needs: [docker]
    permissions:
      contents: read
    uses: devops-infra/triglav/.github/workflows/e2e-action-terraform-validate.yml@master
    with:
      mode: image
      image_tag: ${{ needs.docker.outputs.image_tag }}
    secrets: inherit

  e2e-action-terraform-copy-vars:
    if: inputs.profile == 'actions' && github.event.repository.name == 'action-terraform-copy-vars'
    needs: [docker]
    permissions:
      contents: read
    uses: devops-infra/triglav/.github/workflows/e2e-action-terraform-copy-vars.yml@master
    with:
      mode: image
      image_tag: ${{ needs.docker.outputs.image_tag }}
    secrets: inherit

  e2e-action-template-action:
    if: inputs.profile == 'actions' && github.event.repository.name == 'template-action'
    needs: [pull-request]
    permissions:
      contents: read
    uses: devops-infra/triglav/.github/workflows/e2e-action-template-action.yml@master
    with:
      mode: ref
      image_tag: ''
    secrets: inherit
