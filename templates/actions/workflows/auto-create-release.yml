name: (Auto) Create release

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner to use'
        type: string
        default: 'ubuntu-24.04-arm'
      task-version:
        description: 'Task version to install'
        type: string
        default: '3.x'
      docker-platforms:
        description: 'Docker platforms to build for'
        type: string
        default: 'amd64,arm64'
      version-suffix:
        description: 'Version suffix for Docker tags'
        type: string
        default: ''
      update-dockerhub-description:
        description: 'Update Docker Hub description from repository'
        type: boolean
        default: true
    secrets:
      DOCKER_TOKEN:
        required: true
      DOCKER_USERNAME:
        required: false
    outputs:
      version:
        description: 'Released version'
        value: ${{ jobs.release.outputs.version }}

jobs:
  release:
    name: Create Release
    runs-on: ${{ inputs.runs-on }}
    outputs:
      version: ${{ steps.version.outputs.REL_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        uses: arduino/setup-task@v2.0.0
        with:
          version: ${{ inputs.task-version }}

      - name: Create and push git tags
        id: version
        env:
          VERSION_SUFFIX: ${{ inputs.version-suffix }}
        run: |
          task lint
          task git:set-config
          task version:tag-release
          echo "REL_VERSION=$(task version:get)" >> "$GITHUB_OUTPUT"

      - name: Install Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install QEMU
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:latest
          platforms: ${{ inputs.docker-platforms }}

      - name: Get Docker commands
        env:
          VERSION_SUFFIX: ${{ inputs.version-suffix }}
        run: task docker:cmds

      - name: Build and Push
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          VERSION_SUFFIX: ${{ inputs.version-suffix }}
        run: task docker:push

      - name: Inspect image
        env:
          VERSION_SUFFIX: ${{ inputs.version-suffix }}
        run: task docker:push:inspect

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.REL_VERSION }}
          name: ${{ steps.version.outputs.REL_VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Update Docker Hub description
        if: inputs.update-dockerhub-description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
          repository: ${{ vars.DOCKER_ORG_NAME }}/${{ github.event.repository.name }}
          short-description: ${{ github.event.repository.description }}
