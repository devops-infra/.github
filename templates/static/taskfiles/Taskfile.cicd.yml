version: '3'

silent: true

vars:
  PR_TEMPLATE: https://raw.githubusercontent.com/devops-infra/.github/refs/tags/v1/PULL_REQUEST_TEMPLATE.md
  CONFIGS_BASE_URL: https://raw.githubusercontent.com/devops-infra/.github/refs/tags/v1/templates/static/configs
  TASKFILES_BASE_URL: https://raw.githubusercontent.com/devops-infra/.github/refs/tags/v1/templates/static/taskfiles

tasks:
  pre-commit:
    desc: Run all pre-commit hooks
    cmds:
      - pre-commit run --all-files

  pre-commit:install:
    desc: Install pre-commit hooks
    cmds:
      - pre-commit install

  lint:
    desc: Run all linters (workflows, shell scripts, YAML)
    cmds:
      - task: lint:actionlint
      - task: lint:shellcheck
      - task: lint:yamllint

  lint:actionlint:
    desc: Lint GitHub Actions workflows with actionlint
    cmds:
      - task scripts:lint:actionlint

  lint:shellcheck:
    desc: Lint shell scripts with shellcheck
    cmds:
      - task scripts:lint:shellcheck

  lint:yamllint:
    desc: Lint YAML files with yamllint
    cmds:
      - task scripts:lint:yamllint

  version:get:
    desc: Get current version
    cmds:
      - task scripts:version:get

  version:set:
    desc: Update .version file
    cmds:
      - task scripts:version:set VERSION='{{.VERSION}}'

  version:update:patch:
    desc: Increment patch version (e.g., 1.2.3 -> 1.2.4)
    cmds:
      - task scripts:version:update:patch

  version:update:minor:
    desc: Increment minor version (e.g., 1.2.3 -> 1.3.0)
    cmds:
      - task scripts:version:update:minor

  version:update:major:
    desc: Increment major version (e.g., 1.2.3 -> 2.0.0)
    cmds:
      - task scripts:version:update:major

  version:tag-release:
    desc: Create set of git tags
    cmds:
      - task scripts:version:tag-release

  git:get-pr-template:
    desc: Get pull request template
    cmds:
      - task scripts:git:get-pr-template

  git:set-config:
    desc: Set git user config
    cmds:
      - task scripts:git:set-config

  sync:all:
    desc: Sync all common files
    cmds:
      - task sync:configs
      - task sync:ignores
      - task sync:taskfiles

  sync:configs:
    desc: Sync configuration files from .github static template
    cmds:
      - |
        echo "Syncing configuration files from devops-infra/.github..."
        curl -sL {{.CONFIGS_BASE_URL}}/.editorconfig -o ./.editorconfig
        curl -sL {{.CONFIGS_BASE_URL}}/.pre-commit-config.yaml -o ./.pre-commit-config.yaml
        curl -sL {{.CONFIGS_BASE_URL}}/.shellcheckrc -o ./.shellcheckrc
        curl -sL {{.CONFIGS_BASE_URL}}/.version -o ./.version
        curl -sL {{.CONFIGS_BASE_URL}}/.yamllint.yml -o ./.yamllint.yml
        git add .editorconfig .pre-commit-config.yaml .shellcheckrc .version .yamllint.yml

  sync:ignores:
    desc: Sync ignore files from .github static template
    cmds:
      - |
        echo "Syncing ignore files from devops-infra/.github..."
        curl -sL {{.CONFIGS_BASE_URL}}/.gitignore -o ./.gitignore
        git add .gitignore

  sync:taskfiles:
    desc: Sync Taskfiles from .github static template
    cmds:
      - |
        echo "Syncing Taskfiles from devops-infra/.github..."
        curl -sL {{.TASKFILES_BASE_URL}}/Taskfile.yml -o ./Taskfile.yml
        curl -sL {{.TASKFILES_BASE_URL}}/Taskfile.cicd.yml -o ./Taskfile.cicd.yml
        curl -sL {{.TASKFILES_BASE_URL}}/Taskfile.variables.yml -o ./Taskfile.variables.yml
        curl -sL {{.TASKFILES_BASE_URL}}/Taskfile.scripts.yml -o ./Taskfile.scripts.yml
        git add Taskfile*.yml
