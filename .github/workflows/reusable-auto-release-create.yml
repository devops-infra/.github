name: (Reusable) - (Automatic) Release Create

on:
  workflow_call:
    inputs:
      runs-on:
        description: Runner to use
        type: string
        default: ubuntu-24.04-arm
      task-version:
        description: Task version to install
        type: string
        default: 3.x
      profile:
        description: Repository profile (actions, dockerized, other, static)
        type: string
        default: actions
      release-branch:
        description: Explicit release branch to publish from (for manual dispatch), e.g. release/v1.3.0
        type: string
        required: false
        default: ''
      release-version:
        description: Explicit release version (for manual dispatch), e.g. v1.3.0
        type: string
        required: false
        default: ''
    secrets:
      DOCKER_TOKEN:
        required: false

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write

jobs:
  release:
    runs-on: ${{ inputs.runs-on }}
    outputs:
      should_release: ${{ steps.release-pr.outputs.should_release }}
      tag_exists: ${{ steps.tag-exists.outputs.exists }}
      release_version: ${{ steps.version.outputs.REL_VERSION }}
    steps:
      - name: Log workflow parameters
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "repository=${{ github.repository }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "inputs.runs-on=${{ inputs.runs-on }}"
          echo "inputs.task-version=${{ inputs.task-version }}"
          echo "inputs.profile=${{ inputs.profile }}"
          echo "inputs.release-branch=${{ inputs.release-branch }}"
          echo "inputs.release-version=${{ inputs.release-version }}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        uses: arduino/setup-task@v2.0.0
        with:
          version: ${{ inputs.task-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect merged release branch for current commit
        id: release-pr
        uses: actions/github-script@v9
        with:
          script: |
            const inputReleaseBranch = `${{ inputs.release-branch }}`.trim()
            const inputReleaseVersion = `${{ inputs.release-version }}`.trim()

            const emitVersion = (branchRef, explicitVersion) => {
              const rawVersion = explicitVersion || branchRef.replace(/^release\//, '')
              if (!/^v\d+\.\d+\.\d+$/.test(rawVersion)) {
                core.setFailed(`Resolved release version '${rawVersion}' is invalid. Expected 'vX.Y.Z'.`)
                return false
              }
              core.setOutput('should_release', 'true')
              core.setOutput('release_branch', branchRef)
              core.setOutput('release_version', rawVersion)
              return true
            }

            if (inputReleaseBranch) {
              if (!inputReleaseBranch.startsWith('release/')) {
                core.setFailed(`Input release-branch '${inputReleaseBranch}' must start with 'release/'`)
                return
              }
              core.info(`Using manual dispatch release branch '${inputReleaseBranch}'`)
              emitVersion(inputReleaseBranch, inputReleaseVersion)
              return
            }

            const owner = context.repo.owner
            const repo = context.repo.repo
            const sha = context.sha
            const baseRef = context.ref.replace('refs/heads/', '')

            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: sha,
            })

            const match = prs.find((pr) => pr.merged_at && pr.base?.ref === baseRef && (pr.head?.ref || '').startsWith('release/'))

            if (!match) {
              core.info('No merged release/* PR associated with this commit. Skipping release publishing.')
              core.setOutput('should_release', 'false')
              return
            }

            core.info(`Matched merged release PR #${match.number} from ${match.head.ref} to ${match.base.ref}`)
            emitVersion(match.head.ref, inputReleaseVersion)

      - name: Resolve release version from release branch
        id: version
        if: steps.release-pr.outputs.should_release == 'true'
        run: |
          set -eu
          version='${{ steps.release-pr.outputs.release_version }}'
          if [ -z "$version" ]; then
            echo "❌ ERROR: Resolved version is empty"
            exit 1
          fi
          echo "REL_VERSION=$version" >> "$GITHUB_OUTPUT"

      - name: Check if release tag already exists
        id: tag-exists
        if: steps.release-pr.outputs.should_release == 'true'
        run: |
          set -eu
          version='${{ steps.version.outputs.REL_VERSION }}'
          if git ls-remote --tags origin "refs/tags/${version}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set git config
        if: steps.release-pr.outputs.should_release == 'true' && steps.tag-exists.outputs.exists != 'true'
        run: task git:set-config

      - name: Build and push release artifacts
        if: steps.release-pr.outputs.should_release == 'true' && steps.tag-exists.outputs.exists != 'true' && (inputs.profile == 'actions' || inputs.profile == 'dockerized')
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          VERSION_SUFFIX: ''
          VERSION_OVERRIDE: ${{ steps.version.outputs.REL_VERSION }}
        run: |
          task docker:cmds
          task docker:push
          task docker:push:inspect

      - name: Create and push release tags
        if: steps.release-pr.outputs.should_release == 'true' && steps.tag-exists.outputs.exists != 'true'
        run: VERSION_OVERRIDE='${{ steps.version.outputs.REL_VERSION }}' task version:tag-release

      - name: Create GitHub release
        if: steps.release-pr.outputs.should_release == 'true' && steps.tag-exists.outputs.exists != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.REL_VERSION }}
          generate_release_notes: true

      - name: Docker Hub Description
        if: steps.release-pr.outputs.should_release == 'true' && steps.tag-exists.outputs.exists != 'true' && (inputs.profile == 'actions' || inputs.profile == 'dockerized')
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
          repository: ${{ vars.DOCKER_ORG_NAME }}/${{ github.event.repository.name }}
          short-description: ${{ github.event.repository.description }}

      - name: Detect container structure test configs for release
        id: cst-configs-release
        if: steps.release-pr.outputs.should_release == 'true' && steps.tag-exists.outputs.exists != 'true' && (inputs.profile == 'actions' || inputs.profile == 'dockerized')
        run: |
          shopt -s nullglob
          files=(tests/docker/*.yml tests/docker/*.yaml)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s\n' "${files[@]}" | sort > "$RUNNER_TEMP/cst-configs-release.txt"
          {
            echo "has_tests=true"
            echo "config<<EOF"
            cat "$RUNNER_TEMP/cst-configs-release.txt"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Get release test image ref
        id: cst-image-release
        if: >-
          steps.release-pr.outputs.should_release == 'true' &&
          steps.tag-exists.outputs.exists != 'true' &&
          (inputs.profile == 'actions' || inputs.profile == 'dockerized') &&
          steps.cst-configs-release.outputs.has_tests == 'true'
        run: |
          IMAGE_REF="devopsinfra/${{ github.event.repository.name }}:${{ steps.version.outputs.REL_VERSION }}"
          echo "image=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Run container structure tests for release image
        if: >-
          steps.release-pr.outputs.should_release == 'true' &&
          steps.tag-exists.outputs.exists != 'true' &&
          (inputs.profile == 'actions' || inputs.profile == 'dockerized') &&
          steps.cst-configs-release.outputs.has_tests == 'true'
        uses: devops-infra/action-container-structure-test@v1
        with:
          image: ${{ steps.cst-image-release.outputs.image }}
          config: ${{ steps.cst-configs-release.outputs.config }}
          pull: true

      - name: Skip duplicate release
        if: steps.release-pr.outputs.should_release == 'true' && steps.tag-exists.outputs.exists == 'true'
        run: echo "Release tag already exists for ${{ steps.version.outputs.REL_VERSION }}; skipping publish"

  verify-release-ref-tags:
    if: >-
      inputs.profile == 'actions' &&
      needs.release.outputs.should_release == 'true' &&
      needs.release.outputs.tag_exists != 'true'
    needs: [release]
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - name: Verify patch, minor, and major refs
        env:
          REPO: ${{ github.repository }}
          patch_ref_input: ${{ needs.release.outputs.release_version }}
        run: |
          set -euo pipefail

          repo_url="https://github.com/${REPO}.git"
          patch_ref="${patch_ref_input}"
          version_no_v="${patch_ref#v}"
          major="${version_no_v%%.*}"
          rest="${version_no_v#*.}"
          minor="${rest%%.*}"
          minor_ref="v${major}.${minor}"
          major_ref="v${major}"

          resolve_ref_sha() {
            local ref="$1"
            local sha=""
            sha="$(git ls-remote --tags "${repo_url}" "refs/tags/${ref}^{}" | cut -f1)"
            if [ -z "${sha}" ]; then
              sha="$(git ls-remote --tags "${repo_url}" "refs/tags/${ref}" | cut -f1)"
            fi
            echo "${sha}"
          }

          patch_sha="$(resolve_ref_sha "${patch_ref}")"
          minor_sha="$(resolve_ref_sha "${minor_ref}")"
          major_sha="$(resolve_ref_sha "${major_ref}")"

          test -n "${patch_sha}" || { echo "Missing patch ref: ${patch_ref}"; exit 1; }
          test -n "${minor_sha}" || { echo "Missing minor ref: ${minor_ref}"; exit 1; }
          test -n "${major_sha}" || { echo "Missing major ref: ${major_ref}"; exit 1; }

          test "${minor_sha}" = "${patch_sha}" || {
            echo "Minor ref ${minor_ref} does not match patch ref ${patch_ref}";
            echo "minor_sha=${minor_sha}";
            echo "patch_sha=${patch_sha}";
            exit 1;
          }

          test "${major_sha}" = "${patch_sha}" || {
            echo "Major ref ${major_ref} does not match patch ref ${patch_ref}";
            echo "major_sha=${major_sha}";
            echo "patch_sha=${patch_sha}";
            exit 1;
          }

  e2e-action-commit-push:
    if: >-
      inputs.profile == 'actions' &&
      github.event.repository.name == 'action-commit-push' &&
      needs.release.outputs.should_release == 'true' &&
      needs.release.outputs.tag_exists != 'true'
    needs: [release, verify-release-ref-tags]
    permissions:
      contents: write
    uses: devops-infra/triglav/.github/workflows/e2e-action-commit-push.yml@master
    with:
      mode: ref
      image_tag: ''
    secrets: inherit

  e2e-action-pull-request:
    if: >-
      inputs.profile == 'actions' &&
      github.event.repository.name == 'action-pull-request' &&
      needs.release.outputs.should_release == 'true' &&
      needs.release.outputs.tag_exists != 'true'
    needs: [release, verify-release-ref-tags]
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: devops-infra/triglav/.github/workflows/e2e-action-pull-request.yml@master
    with:
      mode: ref
      image_tag: ''
    secrets: inherit

  e2e-action-container-structure-test:
    if: >-
      inputs.profile == 'actions' &&
      github.event.repository.name == 'action-container-structure-test' &&
      needs.release.outputs.should_release == 'true' &&
      needs.release.outputs.tag_exists != 'true'
    needs: [release, verify-release-ref-tags]
    permissions:
      contents: read
    uses: devops-infra/triglav/.github/workflows/e2e-action-container-structure-test.yml@master
    with:
      mode: image
      image_tag: ${{ needs.release.outputs.release_version }}
    secrets: inherit

  e2e-action-format-hcl:
    if: >-
      inputs.profile == 'actions' &&
      github.event.repository.name == 'action-format-hcl' &&
      needs.release.outputs.should_release == 'true' &&
      needs.release.outputs.tag_exists != 'true'
    needs: [release, verify-release-ref-tags]
    permissions:
      contents: read
    uses: devops-infra/triglav/.github/workflows/e2e-action-format-hcl.yml@master
    with:
      mode: image
      image_tag: ${{ needs.release.outputs.release_version }}
    secrets: inherit

  e2e-action-tflint:
    if: >-
      inputs.profile == 'actions' &&
      github.event.repository.name == 'action-tflint' &&
      needs.release.outputs.should_release == 'true' &&
      needs.release.outputs.tag_exists != 'true'
    needs: [release, verify-release-ref-tags]
    permissions:
      contents: read
    uses: devops-infra/triglav/.github/workflows/e2e-action-tflint.yml@master
    with:
      mode: image
      image_tag: ${{ needs.release.outputs.release_version }}
    secrets: inherit

  e2e-action-terraform-validate:
    if: >-
      inputs.profile == 'actions' &&
      github.event.repository.name == 'action-terraform-validate' &&
      needs.release.outputs.should_release == 'true' &&
      needs.release.outputs.tag_exists != 'true'
    needs: [release, verify-release-ref-tags]
    permissions:
      contents: read
    uses: devops-infra/triglav/.github/workflows/e2e-action-terraform-validate.yml@master
    with:
      mode: image
      image_tag: ${{ needs.release.outputs.release_version }}
    secrets: inherit

  e2e-action-terraform-copy-vars:
    if: >-
      inputs.profile == 'actions' &&
      github.event.repository.name == 'action-terraform-copy-vars' &&
      needs.release.outputs.should_release == 'true' &&
      needs.release.outputs.tag_exists != 'true'
    needs: [release, verify-release-ref-tags]
    permissions:
      contents: read
    uses: devops-infra/triglav/.github/workflows/e2e-action-terraform-copy-vars.yml@master
    with:
      mode: image
      image_tag: ${{ needs.release.outputs.release_version }}
    secrets: inherit

  e2e-action-template-action:
    if: >-
      inputs.profile == 'actions' &&
      github.event.repository.name == 'template-action' &&
      needs.release.outputs.should_release == 'true' &&
      needs.release.outputs.tag_exists != 'true'
    needs: [release, verify-release-ref-tags]
    permissions:
      contents: read
    uses: devops-infra/triglav/.github/workflows/e2e-action-template-action.yml@master
    with:
      mode: ref
      image_tag: ''
    secrets: inherit
