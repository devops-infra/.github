name: (Cron) Weekly repository health

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  call-weekly-health-check:
    uses: ./.github/workflows/reusable-actions-cron-check-dependencies.yml
    with:
      runs-on: ubuntu-24.04-arm
      task-version: 3.x
      enable-docker: false
      enable-lint: true
