name: (Reusable) - (Manual) Release Branch Prepare

on:
  workflow_call:
    inputs:
      runs-on:
        description: Runner to use
        type: string
        default: ubuntu-24.04-arm
      task-version:
        description: Task version to install
        type: string
        default: 3.x
      bump-type:
        description: Bump type (patch, minor, major, set)
        type: string
        required: false
        default: patch
      explicit-version:
        description: Explicit version when type="set"
        type: string
        default: ''
      build-and-push-only:
        description: Skip version update and only build/push artifacts
        type: boolean
        default: false
      profile:
        description: Repository profile (actions, dockerized, other, static)
        type: string
        default: actions
      docker-platforms:
        description: Docker platforms to build for when build-only mode is enabled
        type: string
        default: amd64,arm64
    outputs:
      version:
        description: Updated version
        value: ${{ jobs.prepare.outputs.version }}
    secrets:
      DOCKER_TOKEN:
        required: false

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  prepare:
    name: Resolve version, build RC, and prepare release branch
    runs-on: ${{ inputs.runs-on }}
    outputs:
      version: ${{ steps.export-version.outputs.REL_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        uses: arduino/setup-task@v2.0.0
        with:
          version: ${{ inputs.task-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve target version
        id: version
        if: ${{ !inputs.build-and-push-only }}
        env:
          BUMP_TYPE: ${{ inputs.bump-type }}
          INPUT_VERSION: ${{ inputs.explicit-version }}
        run: |
          set -eux
          next="$(task version:resolve-next BUMP_TYPE="${BUMP_TYPE}" INPUT_VERSION="${INPUT_VERSION}" PROFILE="${{ inputs.profile }}")"
          echo "REL_VERSION=$next" >> "$GITHUB_OUTPUT"

      - name: Resolve current version for build-only mode
        id: version-current
        if: ${{ inputs.build-and-push-only }}
        run: echo "REL_VERSION=$(task version:get)" >> "$GITHUB_OUTPUT"

      - name: Install Docker Buildx
        if: ${{ inputs.profile == 'actions' || inputs.profile == 'dockerized' }}
        uses: docker/setup-buildx-action@v4

      - name: Install QEMU
        if: ${{ inputs.profile == 'actions' || inputs.profile == 'dockerized' }}
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:latest
          platforms: ${{ inputs.docker-platforms }}

      - name: Build and push artifacts only
        if: ${{ inputs.build-and-push-only && (inputs.profile == 'actions' || inputs.profile == 'dockerized') }}
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          VERSION_SUFFIX: ''
        run: |
          task docker:cmds
          task docker:push
          task docker:push:inspect

      - name: Detect container structure test configs in build-only mode
        id: cst-configs
        if: ${{ inputs.build-and-push-only && (inputs.profile == 'actions' || inputs.profile == 'dockerized') }}
        run: |
          shopt -s nullglob
          files=(tests/docker/*.yml tests/docker/*.yaml)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s\n' "${files[@]}" | sort > "$RUNNER_TEMP/cst-configs.txt"
          {
            echo "has_tests=true"
            echo "config<<EOF"
            cat "$RUNNER_TEMP/cst-configs.txt"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Get test image ref in build-only mode
        id: cst-image
        if: ${{ inputs.build-and-push-only && (inputs.profile == 'actions' || inputs.profile == 'dockerized') && steps.cst-configs.outputs.has_tests == 'true' }}
        env:
          VERSION_SUFFIX: ''
        run: |
          VERSION="$(task version:get)"
          IMAGE_REF="devopsinfra/${{ github.event.repository.name }}:${VERSION}"
          echo "image=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Run container structure tests in build-only mode
        if: ${{ inputs.build-and-push-only && (inputs.profile == 'actions' || inputs.profile == 'dockerized') && steps.cst-configs.outputs.has_tests == 'true' }}
        uses: devops-infra/action-container-structure-test@v1.0.0
        with:
          image: ${{ steps.cst-image.outputs.image }}
          config: ${{ steps.cst-configs.outputs.config }}
          pull: true

      - name: Build-only mode without docker
        if: ${{ inputs.build-and-push-only && inputs.profile != 'actions' && inputs.profile != 'dockerized' }}
        run: echo "Build-only mode requested with docker disabled; skipping image build/push"

      - name: Set git config
        if: ${{ !inputs.build-and-push-only }}
        run: task git:set-config

      - name: Apply version changes to repository files
        if: ${{ !inputs.build-and-push-only }}
        run: task version:set VERSION="${{ steps.version.outputs.REL_VERSION }}"

      - name: Build and push release-candidate artifacts
        if: ${{ !inputs.build-and-push-only && (inputs.profile == 'actions' || inputs.profile == 'dockerized') }}
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          VERSION_SUFFIX: '-rc'
          VERSION_OVERRIDE: ${{ steps.version.outputs.REL_VERSION }}
        run: |
          task docker:cmds
          task docker:push
          task docker:push:inspect

      - name: Detect container structure test configs for RC
        id: cst-configs-rc
        if: ${{ !inputs.build-and-push-only && (inputs.profile == 'actions' || inputs.profile == 'dockerized') }}
        run: |
          shopt -s nullglob
          files=(tests/docker/*.yml tests/docker/*.yaml)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s\n' "${files[@]}" | sort > "$RUNNER_TEMP/cst-configs-rc.txt"
          {
            echo "has_tests=true"
            echo "config<<EOF"
            cat "$RUNNER_TEMP/cst-configs-rc.txt"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Get RC test image ref
        id: cst-image-rc
        if: ${{ !inputs.build-and-push-only && (inputs.profile == 'actions' || inputs.profile == 'dockerized') && steps.cst-configs-rc.outputs.has_tests == 'true' }}
        run: |
          IMAGE_REF="devopsinfra/${{ github.event.repository.name }}:${{ steps.version.outputs.REL_VERSION }}-rc"
          echo "image=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Run container structure tests for RC
        if: ${{ !inputs.build-and-push-only && (inputs.profile == 'actions' || inputs.profile == 'dockerized') && steps.cst-configs-rc.outputs.has_tests == 'true' }}
        uses: devops-infra/action-container-structure-test@v1.0.0
        with:
          image: ${{ steps.cst-image-rc.outputs.image }}
          config: ${{ steps.cst-configs-rc.outputs.config }}
          pull: true

      - name: Detect repository changes
        id: changes
        if: ${{ !inputs.build-and-push-only }}
        run: |
          if git diff --quiet --exit-code; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push release branch
        if: ${{ !inputs.build-and-push-only }}
        uses: devops-infra/action-commit-push@v1.2.0
        with:
          github_token: ${{ github.token }}
          commit_message: "chore(release): prepare ${{ steps.version.outputs.REL_VERSION }}"
          base_branch: ${{ github.event.repository.default_branch }}
          reset_target_branch: true
          allow_empty_commit: true
          force_with_lease: true
          target_branch: release/${{ steps.version.outputs.REL_VERSION }}

      - name: Create release pull request
        if: ${{ !inputs.build-and-push-only }}
        uses: devops-infra/action-pull-request@v1.1.1
        with:
          github_token: ${{ github.token }}
          source_branch: release/${{ steps.version.outputs.REL_VERSION }}
          target_branch: ${{ github.event.repository.default_branch }}
          title: "chore(release): prepare ${{ steps.version.outputs.REL_VERSION }}"
          body: |
            Automated release preparation.

            - Version: `${{ steps.version.outputs.REL_VERSION }}`
            - Branch: `release/${{ steps.version.outputs.REL_VERSION }}`
            - Docker artifacts: release-candidate tags (`-rc`)
          allow_no_diff: true
          assignee: ${{ github.actor }}

      - name: Export version output
        id: export-version
        run: |
          if [ "${{ inputs.build-and-push-only }}" = "true" ]; then
            echo "REL_VERSION=${{ steps.version-current.outputs.REL_VERSION }}" >> "$GITHUB_OUTPUT"
          else
            echo "REL_VERSION=${{ steps.version.outputs.REL_VERSION }}" >> "$GITHUB_OUTPUT"
          fi
