name: (Cron) Check dependencies

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner to use'
        type: string
        default: 'ubuntu-24.04-arm'
      task-version:
        description: 'Task version to install'
        type: string
        default: '3.x'
      docker-platforms:
        description: 'Docker platforms to build for'
        type: string
        default: 'amd64,arm64'
    secrets:
      DOCKER_TOKEN:
        required: true

jobs:
  dependency-check:
    name: Test dependencies
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        uses: arduino/setup-task@v2.0.0
        with:
          version: ${{ inputs.task-version }}

      - name: Install Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install QEMU
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:latest
          platforms: ${{ inputs.docker-platforms }}

      - name: Run linters
        run: task lint

      - name: Get Docker commands
        run: task docker:cmds

      - name: Build and push test image
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: task docker:push

      - name: Inspect image
        run: task docker:push:inspect
