name: (Cron) Check dependencies

on: []

permissions:
  contents: read
  packages: write

jobs:
  call-dependency-check:
    uses: ./.github/workflows/reusable/cron-check-dependencies.yml
    with:
      runs-on: ubuntu-24.04-arm
      task-version: 3.x
      docker-platforms: amd64,arm64
    secrets:
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
