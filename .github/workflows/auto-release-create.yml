name: (Automatic) Release Create

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      release_branch:
        description: Release branch to publish from (e.g. release/v1.3.0)
        required: false
        default: ''
        type: string
      release_version:
        description: Explicit release version override (e.g. v1.3.0)
        required: false
        default: ''
        type: string

permissions:
  contents: write
  pull-requests: read

jobs:
  call:
    uses: ./.github/workflows/reusable-auto-release-create.yml
    with:
      runs-on: ubuntu-24.04-arm
      task-version: 3.x
      profile: other
      release-branch: ${{ inputs.release_branch }}
      release-version: ${{ inputs.release_version }}
    secrets: inherit
