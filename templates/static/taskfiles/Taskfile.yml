version: '3'

silent: true

dotenv:
  - .env

includes:
  variables: ./Taskfile.variables.yml
  scripts: ./Taskfile.scripts.yml
  cicd:
    taskfile: ./Taskfile.cicd.yml
    flatten: true

tasks:
  default:
    desc: List tasks
    cmds:
      - task help

  help:
    desc: Detailed help
    cmds:
      - task: scripts:help

  serve:
    desc: Serve the site locally on http://localhost:8000
    cmds:
      - python3 -m http.server 8000 --directory site
