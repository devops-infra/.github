name: (Cron) Weekly repository health

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write
  issues: read

jobs:
  call-weekly-health-check:
    uses: ./.github/workflows/reusable-cron-check-dependencies.yml
    with:
      runs-on: ubuntu-24.04-arm
      task-version: 3.x
      profile: other
    secrets: inherit
