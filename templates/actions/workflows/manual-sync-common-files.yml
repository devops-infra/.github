name: (Manual) Sync Common Files

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner to use'
        type: string
        default: 'ubuntu-24.04-arm'
      task-version:
        description: 'Task version to install'
        type: string
        default: '3.x'
      sync-type:
        description: 'File type to sync (all, configs, ignores, taskfiles)'
        type: string
        required: true
      template-profile:
        description: 'Template profile to use for Taskfile sync (actions, dockerized, other, static)'
        type: string
        default: 'actions'

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Sync common files and create pull request
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        uses: arduino/setup-task@v2.0.0
        with:
          version: ${{ inputs.task-version }}

      - name: Sync files and get PR template
        id: sync
        env:
          TASKFILES_BASE_URL: https://raw.githubusercontent.com/devops-infra/.github/refs/heads/master/templates/${{ inputs.template-profile }}/taskfiles
        run: |
          set -eux
          case "${{ inputs.sync-type }}" in
            all)
              task sync:configs
              task sync:ignores
              ;;
            configs)
              task sync:configs
              ;;
            ignores)
              task sync:ignores
              ;;
            taskfiles)
              ;;
            *)
              echo "Unknown sync type: ${{ inputs.sync-type }}"
              exit 1
              ;;
          esac

          if [ "${{ inputs.sync-type }}" = "all" ] || [ "${{ inputs.sync-type }}" = "taskfiles" ]; then
            echo "▶️ Syncing Taskfiles from devops-infra/.github..."
            curl -sL "${TASKFILES_BASE_URL}/Taskfile.yml" -o ./Taskfile.yml
            curl -sL "${TASKFILES_BASE_URL}/Taskfile.cicd.yml" -o ./Taskfile.cicd.yml
            curl -sL "${TASKFILES_BASE_URL}/Taskfile.variables.yml" -o ./Taskfile.variables.yml
            if curl -fsSL "${TASKFILES_BASE_URL}/Taskfile.scripts.yml" -o ./Taskfile.scripts.yml; then
              git add Taskfile.scripts.yml
            fi
            if curl -fsSL "${TASKFILES_BASE_URL}/Taskfile.docker.yml" -o ./Taskfile.docker.yml; then
              git add Taskfile.docker.yml
            fi
            git add Taskfile.yml Taskfile.cicd.yml Taskfile.variables.yml
            echo "✅ Synced Taskfiles"
          fi
          echo "BRANCH_NAME=chore/sync-common-files-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
          task git:set-config
          task git:get-pr-template

      - name: Push to release branch
        uses: devops-infra/action-commit-push@v1
        with:
          github_token: ${{ github.token }}
          commit_message: ":art: Sync common files from devops-infra/.github"
          target_branch: ${{ steps.sync.outputs.BRANCH_NAME }}

      - name: Create Pull Request
        uses: devops-infra/action-pull-request@v1
        with:
          github_token: ${{ github.token }}
          assignee: ${{ github.actor }}
          template: .tmp/PULL_REQUEST_TEMPLATE.md
          get_diff: true
