name: (Reusable - Manual) Update Version

on:
  workflow_call:
    inputs:
      runs-on:
        description: Runner to use
        type: string
        default: ubuntu-24.04-arm
      task-version:
        description: Task version to install
        type: string
        default: 3.x
      bump-type:
        description: Bump type (patch, minor, major, set)
        type: string
        required: false
        default: patch
      explicit-version:
        description: Explicit version when type="set"
        type: string
        default: ''
      build-and-push-only:
        description: Skip version update and only build/push artifacts
        type: boolean
        default: false
      profile:
        description: Repository profile (actions, dockerized, other, static)
        type: string
        default: actions
      docker-platforms:
        description: Docker platforms to build for when build-only mode is enabled
        type: string
        default: amd64,arm64
    outputs:
      version:
        description: Updated version
        value: ${{ jobs.update.outputs.version }}
    secrets:
      DOCKER_TOKEN:
        required: false

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  update:
    name: Update version and push release branch
    runs-on: ${{ inputs.runs-on }}
    outputs:
      version: ${{ steps.export-version.outputs.REL_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        uses: arduino/setup-task@v2.0.0
        with:
          version: ${{ inputs.task-version }}

      - name: Update version
        id: version
        if: ${{ !inputs.build-and-push-only }}
        env:
          BUMP_TYPE: ${{ inputs.bump-type }}
          INPUT_VERSION: ${{ inputs.explicit-version }}
        run: |
          set -eux
          task version:resolve-next BUMP_TYPE="${BUMP_TYPE}" INPUT_VERSION="${INPUT_VERSION}" PROFILE="${{ inputs.profile }}"
          echo "REL_VERSION=$(task version:get)" >> "$GITHUB_OUTPUT"

      - name: Resolve current version for build-only mode
        id: version-current
        if: ${{ inputs.build-and-push-only }}
        run: echo "REL_VERSION=$(task version:get)" >> "$GITHUB_OUTPUT"

      - name: Install Docker Buildx
        if: ${{ inputs.build-and-push-only && (inputs.profile == 'actions' || inputs.profile == 'dockerized') }}
        uses: docker/setup-buildx-action@v4

      - name: Install QEMU
        if: ${{ inputs.build-and-push-only && (inputs.profile == 'actions' || inputs.profile == 'dockerized') }}
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:latest
          platforms: ${{ inputs.docker-platforms }}

      - name: Build and push artifacts only
        if: ${{ inputs.build-and-push-only && (inputs.profile == 'actions' || inputs.profile == 'dockerized') }}
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          VERSION_SUFFIX: ''
        run: |
          task docker:cmds
          task docker:push
          task docker:push:inspect

      - name: Build-only mode without docker
        if: ${{ inputs.build-and-push-only && inputs.profile != 'actions' && inputs.profile != 'dockerized' }}
        run: echo "Build-only mode requested with docker disabled; skipping image build/push"

      - name: Set git config
        if: ${{ !inputs.build-and-push-only }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push release tags
        if: ${{ !inputs.build-and-push-only }}
        run: task version:tag-release
      - name: Create GitHub release
        if: ${{ !inputs.build-and-push-only }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.REL_VERSION }}
          generate_release_notes: true

      - name: Export version output
        id: export-version
        run: |
          if [ "${{ inputs.build-and-push-only }}" = "true" ]; then
            echo "REL_VERSION=${{ steps.version-current.outputs.REL_VERSION }}" >> "$GITHUB_OUTPUT"
          else
            echo "REL_VERSION=${{ steps.version.outputs.REL_VERSION }}" >> "$GITHUB_OUTPUT"
          fi
